<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#991B1B"/>
      <stop offset="100%" stop-color="#7F1D1D"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="250" fill="none" stroke="url(#gold)" stroke-width="12"/>
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>

  <!-- Compass rose - 8 directions -->
  <g transform="translate(256,256)" stroke="url(#gold)" stroke-width="3" opacity="0.4">
    <!-- Cardinal directions -->
    <polygon points="0,-180 -20,-100 20,-100" fill="url(#gold)"/>
    <polygon points="0,180 -20,100 20,100" fill="url(#gold)"/>
    <polygon points="-180,0 -100,-20 -100,20" fill="url(#gold)"/>
    <polygon points="180,0 100,-20 100,20" fill="url(#gold)"/>
    <!-- Diagonal directions -->
    <polygon points="-127,-127 -60,-90 -90,-60" fill="url(#gold)"/>
    <polygon points="127,-127 60,-90 90,-60" fill="url(#gold)"/>
    <polygon points="-127,127 -60,90 -90,60" fill="url(#gold)"/>
    <polygon points="127,127 60,90 90,60" fill="url(#gold)"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="100" fill="none" stroke-width="2"/>
    <circle cx="0" cy="0" r="95" fill="none" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Chinese characters: 八方帶財 -->
  <!-- Arranged in cross pattern: 八 at top, 方 bottom, 帶 left, 財 right -->

  <!-- 八 (top) -->
  <text x="256" y="170" text-anchor="middle" font-family="'Noto Sans TC','PingFang TC','Microsoft YaHei',sans-serif"
    font-size="48" font-weight="700" fill="url(#gold)" letter-spacing="4">八</text>

  <!-- 方 (bottom) -->
  <text x="256" y="375" text-anchor="middle" font-family="'Noto Sans TC','PingFang TC','Microsoft YaHei',sans-serif"
    font-size="48" font-weight="700" fill="url(#gold)" letter-spacing="4">方</text>

  <!-- 帶 (left) -->
  <text x="170" y="280" text-anchor="middle" font-family="'Noto Sans TC','PingFang TC','Microsoft YaHei',sans-serif"
    font-size="48" font-weight="700" fill="url(#gold)" letter-spacing="4">帶</text>

  <!-- 財 (right) -->
  <text x="342" y="280" text-anchor="middle" font-family="'Noto Sans TC','PingFang TC','Microsoft YaHei',sans-serif"
    font-size="48" font-weight="700" fill="url(#gold)" letter-spacing="4">財</text>

  <!-- Center circle -->
  <circle cx="256" cy="256" r="30" fill="url(#gold)" opacity="0.15"/>
  <circle cx="256" cy="256" r="8" fill="url(#gold)"/>

  <!-- Decorative inner ring -->
  <circle cx="256" cy="256" r="195" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.5"/>

  <!-- Outer decorative dots at 8 compass points -->
  <g fill="url(#gold)">
    <circle cx="256" cy="26" r="5"/>
    <circle cx="256" cy="486" r="5"/>
    <circle cx="26" cy="256" r="5"/>
    <circle cx="486" cy="256" r="5"/>
    <circle cx="93" cy="93" r="4"/>
    <circle cx="419" cy="93" r="4"/>
    <circle cx="93" cy="419" r="4"/>
    <circle cx="419" cy="419" r="4"/>
  </g>
</svg>
