<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="泰文翻譯">
<link rel="apple-touch-icon" href="icon-192.png">
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="description" content="泰文轉繁體中文翻譯工具">
<title>泰文翻譯 — Thai to Chinese</title>
<style>
/* ========================================
   Thai → ZH-TW Translator PWA v3
   繁體中文介面 · 深色/淺色 · 手勢優化
   ======================================== */

/* --- Reset --- */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

/* --- Variables (Dark Default) --- */
:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface-hover: #334155;
  --border: #334155;
  --border-focus: #818cf8;
  --text: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-tertiary: #64748b;
  --accent: #818cf8;
  --accent-hover: #6366f1;
  --accent-subtle: rgba(129,140,248,0.12);
  --error: #f87171;
  --error-bg: rgba(248,113,113,0.1);
  --success: #34d399;
  --success-bg: rgba(52,211,153,0.1);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}

/* --- Light Mode --- */
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f8fafc;
    --surface: #ffffff;
    --surface-hover: #f1f5f9;
    --border: #e2e8f0;
    --border-focus: #818cf8;
    --text: #0f172a;
    --text-secondary: #64748b;
    --text-tertiary: #94a3b8;
    --accent: #6366f1;
    --accent-hover: #4f46e5;
    --accent-subtle: rgba(99,102,241,0.08);
    --error: #dc2626;
    --error-bg: rgba(220,38,38,0.06);
    --success: #059669;
    --success-bg: rgba(5,150,105,0.06);
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
}

/* --- Base --- */
html, body {
  height: 100%;
  overflow: hidden;
}
body {
  font-family: -apple-system, 'Noto Sans TC', 'PingFang TC', 'Noto Sans Thai', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  transition: background .3s, color .3s;
  -webkit-font-smoothing: antialiased;
}

/* --- Offline Banner --- */
#offline-banner {
  display: none;
  background: linear-gradient(135deg, #78350f, #92400e);
  color: #fde68a;
  text-align: center;
  padding: 6px 16px;
  font-size: 13px;
  font-weight: 500;
  flex-shrink: 0;
}
#offline-banner.show { display: block; }

/* --- App Bar --- */
.app-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  padding-top: calc(12px + env(safe-area-inset-top));
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
  transition: border-color .3s;
  -webkit-user-select: none;
  user-select: none;
}
.app-bar-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.3px;
}
.app-bar-title .arrow { color: var(--text-tertiary); margin: 0 6px; }

/* --- Icon Button --- */
.icon-btn {
  background: transparent;
  border: none;
  color: var(--text-secondary);
  width: 40px; height: 40px;
  border-radius: 10px;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s, color .15s;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn:active { background: var(--accent-subtle); color: var(--accent); }

/* --- Main --- */
main {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
  padding-bottom: calc(16px + env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* --- Card (Surface) --- */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  transition: background .3s, border-color .3s;
}

/* --- Input Area --- */
.input-area {
  position: relative;
}
.input-area textarea {
  width: 100%;
  min-height: 160px;
  max-height: 50vh;
  resize: vertical;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px;
  padding-bottom: 28px;
  font-size: 16px;
  line-height: 1.7;
  font-family: inherit;
  outline: none;
  transition: border-color .2s, background .3s;
}
.input-area textarea:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px var(--accent-subtle);
}
.input-area textarea::placeholder { color: var(--text-tertiary); }
.input-meta {
  position: absolute;
  bottom: 8px;
  right: 10px;
  font-size: 11px;
  color: var(--text-tertiary);
  pointer-events: none;
}

/* --- Translate Button --- */
.btn-translate {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius-md);
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background .2s, transform .12s, opacity .2s;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  overflow: hidden;
}
.btn-translate:active { transform: scale(0.97); }
.btn-translate:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}
.btn-translate .label {
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-translate .shortcut-hint {
  font-size: 12px;
  opacity: 0.6;
  font-weight: 400;
}
@media (hover: hover) {
  .btn-translate:hover { background: var(--accent-hover); }
}

/* --- Loading --- */
#loading {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 20px;
  color: var(--text-secondary);
  font-size: 14px;
}
#loading.show { display: flex; }
.loading-dots {
  display: flex;
  gap: 4px;
}
.loading-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: dotBounce 1.4s ease-in-out infinite both;
}
.loading-dots span:nth-child(1) { animation-delay: 0s; }
.loading-dots span:nth-child(2) { animation-delay: 0.16s; }
.loading-dots span:nth-child(3) { animation-delay: 0.32s; }
@keyframes dotBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* --- Error --- */
#error {
  display: none;
  background: var(--error-bg);
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 14px;
  line-height: 1.5;
  color: var(--error);
  animation: fadeSlideIn .25s ease;
}
#error.show { display: block; }

/* --- Result --- */
#result {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px;
  padding-top: 14px;
  animation: fadeSlideIn .3s ease;
  position: relative;
}
#result.show { display: block; }
#result .result-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
#result .result-text {
  font-size: 16px;
  line-height: 1.8;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--text);
}
#result .result-actions {
  display: flex;
  gap: 6px;
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.result-btn {
  background: var(--surface-hover);
  border: none;
  color: var(--text-secondary);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  transition: background .15s, color .15s;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  align-items: center;
  gap: 4px;
}
.result-btn:active { background: var(--accent-subtle); color: var(--accent); }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* --- Footer --- */
.footer {
  text-align: center;
  padding: 10px 16px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
  font-size: 11px;
  color: var(--text-tertiary);
  flex-shrink: 0;
  border-top: 1px solid var(--border);
}

/* ================================================
   SETTINGS PANEL
   ================================================ */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  justify-content: center;
  align-items: flex-end;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.overlay.show { display: flex; }
.panel {
  background: var(--surface);
  width: 100%;
  max-width: 500px;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 24px;
  animation: panelUp .3s ease;
  max-height: 85vh;
  overflow-y: auto;
}
@keyframes panelUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.panel-title {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel-group { margin-bottom: 20px; }
.panel-group:last-child { margin-bottom: 0; }
.panel-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  display: block;
  margin-bottom: 8px;
}
.panel-input-wrap {
  display: flex;
  gap: 8px;
}
.panel-input-wrap input {
  flex: 1;
  padding: 12px;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: monospace;
  outline: none;
  transition: border-color .2s;
}
.panel-input-wrap input:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 2px var(--accent-subtle);
}
.panel-hint {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 6px;
  line-height: 1.5;
}
.panel-btns {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.panel-btns .btn { flex: 1; padding: 10px; font-size: 14px; }

.btn-ghost {
  background: var(--surface-hover);
  border: none;
  color: var(--text);
  border-radius: var(--radius-sm);
  font-weight: 500;
  cursor: pointer;
  transition: background .15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-ghost:active { background: var(--border); }

.btn-provider {
  flex: 1;
  padding: 10px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-secondary);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-provider.active {
  border-color: var(--accent);
  background: var(--accent-subtle);
  color: var(--accent);
  font-weight: 600;
}

.btn-primary-sm {
  background: var(--accent);
  border: none;
  color: #fff;
  border-radius: var(--radius-sm);
  font-weight: 600;
  cursor: pointer;
  transition: background .15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-primary-sm:active { background: var(--accent-hover); }

.status-msg {
  font-size: 13px;
  margin-top: 10px;
  padding: 8px 12px;
  border-radius: 6px;
  display: none;
}
.status-msg.show { display: block; }
.status-msg.ok { background: var(--success-bg); color: var(--success); }
.status-msg.fail { background: var(--error-bg); color: var(--error); }

.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 20px 0;
}

.app-info {
  font-size: 13px;
  color: var(--text-tertiary);
  line-height: 1.6;
}
.app-info .dot { color: var(--text-tertiary); }
.app-info .ok { color: var(--success); }
.app-info .fail { color: var(--error); }

/* --- Panel close on tap outside --- */
.panel-bg-close {
  position: absolute;
  inset: 0;
}
.panel, .panel-bg-close { position: relative; }
</style>
</head>
<body>

<!-- ===== OFFLINE BANNER ===== -->
<div id="offline-banner">⚠️ 目前離線，部分功能可能無法使用</div>

<!-- ===== APP BAR ===== -->
<header class="app-bar">
  <div class="app-bar-title">
    🇹🇭 <span class="arrow">→</span> 🇹🇼 中文
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <span id="engineBadge" style="font-size:11px;background:var(--accent-subtle);color:var(--accent);padding:3px 8px;border-radius:20px;font-weight:500">Gemini</span>
    <button class="icon-btn" onclick="toggleSettings()" aria-label="設定">⚙️</button>
  </div>
</header>

<!-- ===== MAIN ===== -->
<main>
  <!-- 首次使用提示 -->
  <div id="onboarding" style="display:none;background:var(--accent-subtle);border:1px solid var(--accent);border-radius:var(--radius-sm);padding:12px 16px;font-size:14px;line-height:1.5;animation:fadeSlideIn .4s ease">
    ✅ Gemini 金鑰已就緒，貼上泰文即可翻譯！
    <button onclick="dismissOnboarding()" style="background:none;border:none;color:var(--accent);float:right;font-size:16px;cursor:pointer">✕</button>
  </div>

  <!-- Input -->
  <div class="card input-area">
    <textarea id="input" placeholder="在此貼上泰文..."
      oninput="onInput()"></textarea>
    <button id="clearBtn" class="input-clear" onclick="clearInput()" style="display:none">✕</button>
    <div class="input-meta" id="charCount">0 字</div>
  </div>

  <!-- Action Row -->
  <div style="display:flex;gap:8px">
    <button class="btn btn-primary" id="btn" onclick="translate2()" style="flex:1">
      <span class="label">
        <span>翻譯</span>
        <span class="shortcut-hint">Ctrl+↵</span>
      </span>
    </button>
    <button class="btn-sample" onclick="fillSample()" title="試試範例">📝</button>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
    <span>翻譯中... <span id="elapsed" style="font-size:12px;opacity:0.6"></span></span>
  </div>

  <!-- Error -->
  <div id="error"></div>

  <!-- Result -->
  <div id="result">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div class="result-label">翻譯結果</div>
      <button class="result-btn" onclick="copyResult()">📋 複製</button>
    </div>
    <div class="result-text" id="resultText"></div>
    <div style="margin-top:8px;display:flex;gap:6px;justify-content:flex-end">
      <span style="font-size:11px;color:var(--text-tertiary)" id="resultEngine"></span>
    </div>
  </div>

  <!-- History -->
  <div id="history" style="display:none;margin-top:4px">
    <button onclick="toggleHistory()" style="background:none;border:none;color:var(--text-tertiary);font-size:13px;cursor:pointer;width:100%;text-align:center;padding:8px">
      📜 翻譯紀錄 ▾
    </button>
    <div id="historyList" style="display:none"></div>
  </div>
  </div>
</main>

<!-- ===== FOOTER ===== -->
<div class="footer">金鑰僅儲存在本機瀏覽器</div>

<!-- ===== SETTINGS PANEL ===== -->
<div class="overlay" id="settings" onclick="if(event.target===this)closeSettings()">
  <div class="panel" onclick="event.stopPropagation()">
    <div class="panel-title">
      <span>⚙️ 設定</span>
      <button class="icon-btn" style="margin-left:auto;font-size:18px;width:36px;height:36px" onclick="closeSettings()">✕</button>
    </div>

    <div class="panel-group">
      <label class="panel-label">翻譯引擎</label>
      <div class="panel-btns" style="margin-bottom:16px">
        <button class="btn-provider" id="prov-gemini" onclick="switchProvider('gemini')">Gemini ⭐</button>
        <button class="btn-provider" id="prov-agnes" onclick="switchProvider('agnes')">Agnes</button>
      </div>

      <label class="panel-label" id="keyLabel">Gemini API 金鑰</label>
      <div class="panel-input-wrap">
        <input type="password" id="apikey"
          placeholder="AI..." spellcheck="false"
          onkeydown="if(event.key==='Enter')saveKey()">
        <button class="btn-ghost" style="flex:0;padding:12px;font-size:16px"
          onclick="toggleKeyVis()">👁️</button>
      </div>
      <div class="panel-hint">
        金鑰僅存在此瀏覽器，直接送至 Gemini API，不會經過第三方伺服器。
      </div>
      <div class="panel-btns">
        <button class="btn-ghost" onclick="verifyKey()">驗證連線</button>
        <button class="btn-primary-sm" onclick="saveKey()">儲存</button>
      </div>
      <div class="status-msg" id="keyStatus"></div>
    </div>

    <hr class="divider">

    <div class="panel-group">
      <label class="panel-label">應用程式資訊</label>
      <div class="app-info">
        <div>版本：3.1 · 雙 API 支援</div>
        <div id="swInfo">Service Worker：檢查中...</div>
        <div style="margin-top:4px" id="currentProvider">使用引擎：Gemini</div>
      </div>
      <div class="panel-btns">
        <button class="btn-ghost" onclick="checkUpdate()">檢查更新</button>
      </div>
    </div>

    <hr class="divider">

    <div class="panel-group">
      <button class="btn-ghost" style="width:100%;padding:10px;text-align:center;font-size:14px"
        onclick="clearAll()">清除所有資料</button>
    </div>

    <!-- invisible close zone -->
    <div style="height:20px"></div>
  </div>
</div>

<script>
/* ============================================
   Thai → ZH-TW Translator PWA v3
   繁體中文介面 · App Shell · Gemini + Agnes
   ============================================ */

// --- API Providers ---
const PROVIDERS = {
  gemini: {
    name: 'Gemini',
    url: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent',
    headers: (key) => ({
      'Content-Type': 'application/json',
      'X-goog-api-key': key
    }),
    body: (messages) => ({
      contents: messages.map(m => ({
        role: m.role === 'assistant' ? 'model' : 'user',
        parts: [{ text: m.content }]
      }))
    }),
    extract: (data) => data.candidates?.[0]?.content?.parts?.[0]?.text || '',
    keyLabel: 'Gemini API 金鑰',
    keyPlaceholder: 'AI...'
  },
  agnes: {
    name: 'Agnes',
    url: 'https://apihub.agnes-ai.com/v1/chat/completions',
    headers: (key) => ({
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + key
    }),
    body: (messages) => ({
      model: 'agnes-2.0-flash',
      messages: messages,
      temperature: 0.3,
      max_tokens: 4096
    }),
    extract: (data) => data.choices?.[0]?.message?.content || '',
    keyLabel: 'Agnes API 金鑰',
    keyPlaceholder: 'cpk-...'
  }
};

const SYSTEM_PROMPT = `[ROLE]
專業泰文翻譯，泰國本地語言專家 → 繁體中文（台灣正體）。

[SCOPE]
翻譯泰文為自然繁體中文，不含法律條文。

[RULES]
1. 必須真正懂泰文在地用法（網路語、流行語、方言、皇家用語）
2. 禁止中式泰文、禁止逐字硬翻
3. 必須考慮語氣層級轉換
4. 泰文專有名詞保持音譯 + 中文備註
5. 翻譯完要像台灣人寫的中文，不是翻譯腔`;

// --- State ---
let savedKey = {
  gemini: localStorage.getItem('gemini_api_key') || 'AIzaSyDkASg8yJQEuY66VHMqhAAGQo6WYtHUdHU',
  agnes: localStorage.getItem('agnes_api_key') || ''
};
let activeProvider = localStorage.getItem('active_provider') || 'gemini';
let busy = false;
let copyTimeout = null;

// --- DOM ---
const $ = id => document.getElementById(id);
const input = $('input');
const btn = $('btn');
const loading = $('loading');
const resultDiv = $('result');
const resultText = $('resultText');
const errorDiv = $('error');
const charCount = $('charCount');

// --- Init ---
document.addEventListener('DOMContentLoaded', () => {
  initSW();
  if (savedKey.gemini && input.value.trim()) {
    charCount.textContent = input.value.length + ' 字';
  }
});

// ============ SERVICE WORKER ============
async function initSW() {
  if (!('serviceWorker' in navigator)) {
    $('swInfo').textContent = 'Service Worker：❌ 此瀏覽器不支援';
    return;
  }
  try {
    const reg = await navigator.serviceWorker.register('service-worker.js', {
      scope: '/thai-zh-pwa/'
    });
    $('swInfo').textContent = 'Service Worker：✅ 已註冊 (v2)';
    reg.addEventListener('updatefound', () => {
      $('swInfo').textContent = 'Service Worker：🔄 發現新版本';
    });
  } catch(e) {
    $('swInfo').textContent = 'Service Worker：❌ ' + e.message;
  }
}

async function checkUpdate() {
  if (!('serviceWorker' in navigator)) return;
  const reg = await navigator.serviceWorker.getRegistration();
  if (reg) {
    await reg.update();
    alert('✅ 已檢查更新，若無反應則為最新版本');
  }
}

// ============ OFFLINE ============
window.addEventListener('offline', () => $('offline-banner').classList.add('show'));
window.addEventListener('online', () => $('offline-banner').classList.remove('show'));

// ============ INPUT ============
function onInput() {
  const len = input.value.length;
  charCount.textContent = len + ' 字';
  if (resultDiv.classList.contains('show')) resultDiv.classList.remove('show');
  if (errorDiv.classList.contains('show')) errorDiv.classList.remove('show');
}

// ============ TRANSLATION ============
async function translate2() {
  if (busy) return;
  const text = input.value.trim();
  if (!text) { input.focus(); return; }

  const provider = PROVIDERS[activeProvider];
  const key = savedKey[activeProvider];
  if (!key) {
    showError('⚠️ 請先點右上 ⚙️ 設定 ' + provider.name + ' API 金鑰');
    setTimeout(() => toggleSettings(), 500);
    return;
  }

  busy = true;
  btn.disabled = true;
  loading.classList.add('show');
  resultDiv.classList.remove('show');
  errorDiv.classList.remove('show');

  try {
    const systemMsg = { role: 'system', content: SYSTEM_PROMPT };
    const userMsg = { role: 'user', content: '原文：\n' + text };
    const res = await fetch(provider.url, {
      method: 'POST',
      headers: provider.headers(key),
      body: JSON.stringify(provider.body([systemMsg, userMsg]))
    });

    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      const msg = err.error?.message || err.error?.code || `HTTP ${res.status}`;
      throw new Error(msg);
    }

    const data = await res.json();
    const translated = provider.extract(data);
    if (!translated) throw new Error('API 回傳格式異常');
    resultText.textContent = translated.trim();
    resultDiv.classList.add('show');
    resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  } catch(e) {
    if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
      showError('🌐 網路連線失敗，請確認網路後重試');
    } else if (e.message.includes('API_KEY_INVALID') || e.message.includes('401') || e.message.includes('Unauthorized')) {
      showError('🔑 ' + provider.name + ' API 金鑰無效，請在設定中重新輸入');
    } else {
      showError('❌ ' + provider.name + '：' + e.message);
    }
  }

  loading.classList.remove('show');
  btn.disabled = false;
  busy = false;
}

function showError(msg) {
  errorDiv.textContent = msg;
  errorDiv.classList.add('show');
  errorDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ============ RESULT ACTIONS ============
async function copyResult() {
  const text = resultText.textContent;
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    const btn = document.querySelector('.result-btn');
    const orig = btn.textContent;
    btn.textContent = '✅ 已複製';
    clearTimeout(copyTimeout);
    copyTimeout = setTimeout(() => { btn.textContent = orig; }, 1500);
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
  }
}

// ============ SETTINGS ============
function toggleSettings() {
  $('settings').classList.toggle('show');
  if ($('settings').classList.contains('show')) {
    updateProviderUI();
    $('apikey').value = savedKey[activeProvider] || '';
    $('apikey').placeholder = PROVIDERS[activeProvider].keyPlaceholder;
    $('keyLabel').textContent = PROVIDERS[activeProvider].keyLabel;
  }
}
function closeSettings() { $('settings').classList.remove('show'); }
function toggleKeyVis() {
  const el = $('apikey');
  el.type = el.type === 'password' ? 'text' : 'password';
}

function switchProvider(name) {
  // Save current key first
  const currentKey = $('apikey').value.trim();
  if (currentKey) savedKey[activeProvider] = currentKey;

  activeProvider = name;
  localStorage.setItem('active_provider', name);

  // Load key for new provider
  $('apikey').value = savedKey[name] || '';
  $('apikey').placeholder = PROVIDERS[name].keyPlaceholder;
  $('keyLabel').textContent = PROVIDERS[name].keyLabel;
  $('currentProvider').textContent = '使用引擎：' + PROVIDERS[name].name;

  // Update hint text
  const hints = {
    gemini: '金鑰僅存在此瀏覽器，直接送至 Gemini API，不會經過第三方伺服器。',
    agnes: '金鑰僅存在此瀏覽器，每次翻譯請求直接送至 Agnes API，不會經過第三方伺服器。'
  };
  document.querySelector('.panel-hint').textContent = hints[name] || '';

  updateProviderUI();
  // Clear previous status
  document.getElementById('keyStatus').classList.remove('show');
}

function updateProviderUI() {
  document.querySelectorAll('.btn-provider').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('prov-' + activeProvider);
  if (btn) btn.classList.add('active');
  $('currentProvider').textContent = '使用引擎：' + PROVIDERS[activeProvider].name;
  $('apikey').placeholder = PROVIDERS[activeProvider].keyPlaceholder;
  $('keyLabel').textContent = PROVIDERS[activeProvider].keyLabel;
}

function saveKey() {
  const key = $('apikey').value.trim();
  const provider = PROVIDERS[activeProvider];
  const storageKey = activeProvider + '_api_key';
  if (key) {
    localStorage.setItem(storageKey, key);
    savedKey[activeProvider] = key;
    showKeyStatus('✅ ' + provider.name + ' 金鑰已儲存', 'ok');
  } else {
    localStorage.removeItem(storageKey);
    savedKey[activeProvider] = '';
    showKeyStatus('金鑰已清除', 'ok');
  }
  setTimeout(() => closeSettings(), 800);
}
async function verifyKey() {
  const key = $('apikey').value.trim();
  const provider = PROVIDERS[activeProvider];
  if (!key) { showKeyStatus('請先貼入金鑰', 'fail'); return; }

  showKeyStatus('驗證中...', 'ok');
  try {
    const testMsg = { role: 'user', content: 'ok' };
    const res = await fetch(provider.url, {
      method: 'POST',
      headers: provider.headers(key),
      body: JSON.stringify(provider.body([testMsg]))
    });
    if (res.ok) showKeyStatus('✅ ' + provider.name + ' 連線正常', 'ok');
    else {
      const e = await res.json().catch(()=>({}));
      showKeyStatus('❌ ' + (e.error?.message || e.error?.code || '無效'), 'fail');
    }
  } catch(e) {
    showKeyStatus('❌ 無法連線：' + e.message, 'fail');
  }
}
function showKeyStatus(msg, type) {
  const el = $('keyStatus');
  el.textContent = msg;
  el.className = 'status-msg show ' + type;
}

function clearAll() {
  if (!confirm('確定要清除所有資料（含兩組金鑰與快取）？')) return;
  localStorage.removeItem('gemini_api_key');
  localStorage.removeItem('agnes_api_key');
  localStorage.removeItem('active_provider');
  savedKey = { gemini: '', agnes: '' };
  activeProvider = 'gemini';
  $('apikey').value = '';
  updateProviderUI();
  showKeyStatus('已清除所有資料', 'ok');
  if ('caches' in window) {
    caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
  }
}

// ============ KEYBOARD ============
input.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    translate2();
  }
});

// Close settings on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && $('settings').classList.contains('show')) closeSettings();
});
</script>
