<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<!-- PWA: iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TH↔ZH">
<link rel="apple-touch-icon" href="icon-192.png">
<!-- PWA: general -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="description" content="泰文翻譯繁體中文 — 專業泰國本地用語即時翻譯">
<title>แปลไทย → 中文</title>
<style>
/* === RESET === */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* === VARIABLES === */
:root {
  --bg: #111827;
  --surface: #1f2937;
  --border: #374151;
  --text: #f3f4f6;
  --text-secondary: #9ca3af;
  --accent: #6366f1;
  --accent-hover: #4f46e5;
  --error: #f87171;
  --error-bg: #450a0a;
  --radius: 12px;
}

/* === BASE === */
body {
  font-family: -apple-system, 'Noto Sans Thai', 'Noto Sans TC', 'PingFang TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  /* safe area for notch phones */
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

/* === HEADER (App Shell) === */
.app-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  padding-top: calc(12px + env(safe-area-inset-top));
  border-bottom: 1px solid var(--border);
  -webkit-user-select: none;
  user-select: none;
  flex-shrink: 0;
}
.app-bar__title {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.app-bar__title span { color: var(--text-secondary); }
.app-bar__actions { display: flex; gap: 4px; }
.icon-btn {
  background: none; border: none; color: var(--text-secondary);
  font-size: 22px; padding: 6px 8px; cursor: pointer;
  border-radius: 8px; transition: background .15s;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn:active { background: var(--surface); }

/* === MAIN CONTENT === */
main {
  flex: 1;
  padding: 16px;
  padding-bottom: calc(16px + env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* === TEXTAREA === */
.input-area {
  position: relative;
}
textarea {
  width: 100%;
  min-height: 180px;
  resize: vertical;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  font-size: 16px;
  line-height: 1.7;
  font-family: inherit;
  outline: none;
  transition: border-color .2s;
}
textarea:focus { border-color: var(--accent); }
textarea::placeholder { color: #6b7280; }

.char-count {
  position: absolute;
  bottom: 10px;
  right: 12px;
  font-size: 11px;
  color: #6b7280;
  pointer-events: none;
}

/* === TRANSLATE BUTTON === */
.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius);
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: transform .15s, opacity .2s;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:active { transform: scale(0.97); }
.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* === LOADING === */
#loading {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 16px;
  color: var(--text-secondary);
  font-size: 14px;
}
#loading.show { display: flex; }
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* === ERROR === */
#error {
  display: none;
  background: var(--error-bg);
  color: var(--error);
  border: 1px solid #7f1d1d;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.5;
}
#error.show { display: block; }

/* === RESULT === */
#result {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  font-size: 16px;
  line-height: 1.8;
  white-space: pre-wrap;
  word-break: break-word;
  position: relative;
}
#result.show { display: block; }

.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: var(--border);
  border: none;
  color: var(--text-secondary);
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  opacity: 0;
  transition: opacity .2s;
}
#result:hover .copy-btn,
.copy-btn:focus { opacity: 1; }

/* === OFFLINE BANNER === */
#offline-banner {
  display: none;
  background: #78350f;
  color: #fbbf24;
  text-align: center;
  padding: 6px;
  font-size: 12px;
  flex-shrink: 0;
}
#offline-banner.show { display: block; }

/* === FOOTER === */
.footer {
  text-align: center;
  padding: 12px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
  font-size: 11px;
  color: #6b7280;
  flex-shrink: 0;
}

/* === SETTINGS PANEL === */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  justify-content: center;
  align-items: flex-end;
}
.overlay.show { display: flex; }
.panel {
  background: var(--surface);
  width: 100%;
  max-width: 480px;
  border-radius: 16px 16px 0 0;
  padding: 24px;
  animation: slideUp .25s ease;
  max-height: 85vh;
  overflow-y: auto;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.panel h2 { font-size: 16px; margin-bottom: 16px; }
.panel label {
  font-size: 13px;
  color: var(--text-secondary);
  display: block;
  margin-bottom: 6px;
}
.panel input {
  width: 100%;
  padding: 12px;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  font-family: monospace;
}
.panel input:focus { border-color: var(--accent); }
.panel .hint {
  font-size: 12px;
  color: #6b7280;
  margin: 8px 0 16px;
}
.panel .row { display: flex; gap: 8px; }
.panel .row .btn { flex: 1; padding: 10px; font-size: 14px; }
.btn-ghost {
  background: var(--border);
  color: var(--text);
}
.status {
  font-size: 13px;
  margin-top: 10px;
  padding: 8px 12px;
  border-radius: 6px;
  display: none;
}
.status.show { display: block; }
.status.ok { background: #064e3b; color: #6ee7b7; }
.status.fail { background: var(--error-bg); color: var(--error); }
</style>
</head>
<body>

<!-- Offline Banner (App Shell) -->
<div id="offline-banner">📡 離線模式 — 部分功能可能受限</div>

<!-- App Bar (App Shell) -->
<header class="app-bar">
  <div class="app-bar__title">🇹🇭 <span>→</span> 中文 🇹🇼</div>
  <div class="app-bar__actions">
    <button class="icon-btn" onclick="toggleSettings()" aria-label="設定">⚙️</button>
  </div>
</header>

<!-- Main Content -->
<main>
  <!-- Input -->
  <div class="input-area">
    <textarea id="input" placeholder="貼上泰文..."
      oninput="onInput()"></textarea>
    <div class="char-count" id="charCount">0</div>
  </div>

  <!-- Translate Button -->
  <button class="btn btn-primary" id="btn" onclick="translate2()">
    <span>翻譯</span>
    <span style="font-size:14px;opacity:0.7">แปล</span>
  </button>

  <!-- Loading State -->
  <div id="loading">
    <div class="spinner"></div>
    <span>翻譯中...</span>
  </div>

  <!-- Error State -->
  <div id="error"></div>

  <!-- Result -->
  <div id="result">
    <button class="copy-btn" onclick="copyResult()">📋 複製</button>
    <div id="resultText"></div>
  </div>
</main>

<!-- Footer -->
<div class="footer">กุญแจ API ถูกเก็บไว้ในเครื่องคุณเท่านั้น</div>

<!-- Settings Panel -->
<div class="overlay" id="settings" onclick="closeOnBg(event)">
  <div class="panel" onclick="event.stopPropagation()">
    <h2>⚙️ 設定</h2>
    <label>Agnes API 金鑰</label>
    <div class="row">
      <input type="password" id="apikey"
        placeholder="cpk-xxxxxxxxxxxxxxxxxxxx" spellcheck="false">
      <button class="btn btn-ghost" style="flex:0;padding:10px 14px"
        onclick="toggleKeyVis()">👁️</button>
    </div>
    <div class="hint">金鑰只存在你的瀏覽器，不會外傳</div>
    <div class="row">
      <button class="btn btn-ghost" onclick="verifyKey()">驗證</button>
      <button class="btn btn-primary" onclick="saveKey()">儲存</button>
    </div>
    <div class="status" id="keyStatus"></div>

    <hr style="border-color:var(--border);margin:20px 0">

    <label>App 版本</label>
    <div style="color:var(--text-secondary);font-size:13px;">
      v2.0 · Service Worker 已註冊
      <span id="swStatus"></span>
    </div>
    <button class="btn btn-ghost" style="margin-top:10px;"
      onclick="updateSW()">檢查更新</button>
  </div>
</div>

<script>
/* ============================================
   Thai → ZH-TW Translator PWA v2
   Architecture: App Shell + Network-first API
   ============================================ */

// === CONSTANTS ===
const API_URL = 'https://apihub.agnes-ai.com/v1/chat/completions';
const MODEL = 'agnes-2.0-flash';
const SYSTEM = `[ROLE]
專業泰文翻譯，泰國本地語言專家 → 繁體中文（台灣正體）。

[SCOPE]
翻譯泰文為自然繁體中文，不含法律條文。

[RULES]
1. 必須真正懂泰文在地用法（網路語、流行語、方言、皇家用語）
2. 禁止中式泰文、禁止逐字硬翻
3. 必須考慮語氣層級轉換
4. 泰文專有名詞保持音譯 + 中文備註
5. 翻譯完要像台灣人寫的中文，不是翻譯腔`;

// === STATE ===
let savedKey = localStorage.getItem('agnes_api_key') || '';
let busy = false;

// === DOM REFS ===
const $ = id => document.getElementById(id);
const input = $('input');
const btn = $('btn');
const loading = $('loading');
const result = $('result');
const resultText = $('resultText');
const error = $('error');
const charCount = $('charCount');

// === INIT ===
document.addEventListener('DOMContentLoaded', () => {
  registerSW();
});

// === SERVICE WORKER ===
async function registerSW() {
  if (!('serviceWorker' in navigator)) {
    $('swStatus').textContent = '· ❌ 不支援';
    return;
  }
  try {
    const reg = await navigator.serviceWorker.register('service-worker.js', {
      scope: '/thai-zh-pwa/'
    });
    $('swStatus').textContent = '· ✅ v2';
    // Check for updates
    reg.addEventListener('updatefound', () => {
      console.log('[SW] Update found');
    });
  } catch(e) {
    $('swStatus').textContent = '· ❌ ' + e.message;
  }
}

async function updateSW() {
  if (!('serviceWorker' in navigator)) return;
  const reg = await navigator.serviceWorker.getRegistration();
  if (reg) {
    await reg.update();
    alert('已檢查更新');
  }
}

// === OFFLINE DETECTION ===
window.addEventListener('offline', () => {
  $('offline-banner').classList.add('show');
});
window.addEventListener('online', () => {
  $('offline-banner').classList.remove('show');
});

// === INPUT ===
function onInput() {
  const len = input.value.length;
  charCount.textContent = len > 999 ? '999+' : len;
  // Clear previous result on new input
  if (result.classList.contains('show')) {
    result.classList.remove('show');
  }
  if (error.classList.contains('show')) {
    error.classList.remove('show');
  }
}

// === TRANSLATION ===
async function translate2() {
  if (busy) return;
  const text = input.value.trim();
  if (!text) return;

  const key = savedKey || localStorage.getItem('agnes_api_key');
  if (!key) {
    showError('⚠️ 請先點 ⚙️ 設定 API 金鑰');
    return;
  }

  busy = true;
  btn.disabled = true;
  loading.classList.add('show');
  result.classList.remove('show');
  error.classList.remove('show');

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + key
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [
          { role: 'system', content: SYSTEM },
          { role: 'user', content: '原文：\n' + text }
        ],
        temperature: 0.3,
        max_tokens: 4096
      })
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error?.message || res.statusText);
    }

    const data = await res.json();
    resultText.textContent = data.choices[0].message.content.trim();
    result.classList.add('show');

  } catch(e) {
    if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
      showError('🌐 網路連線失敗，請檢查網路後重試');
    } else {
      showError('❌ ' + e.message);
    }
  }

  loading.classList.remove('show');
  btn.disabled = false;
  busy = false;
}

function showError(msg) {
  error.textContent = msg;
  error.classList.add('show');
}

// === COPY ===
async function copyResult() {
  const text = resultText.textContent;
  try {
    await navigator.clipboard.writeText(text);
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ 已複製';
    setTimeout(() => { btn.textContent = '📋 複製'; }, 1500);
  } catch {
    alert('複製失敗，請手動選取');
  }
}

// === SETTINGS ===
function toggleSettings() {
  $('settings').classList.toggle('show');
  if ($('settings').classList.contains('show')) {
    $('apikey').value = savedKey;
  }
}

function closeOnBg(e) {
  if (e.target === e.currentTarget) {
    e.currentTarget.classList.remove('show');
  }
}

function toggleKeyVis() {
  const el = $('apikey');
  el.type = el.type === 'password' ? 'text' : 'password';
}

function saveKey() {
  const key = $('apikey').value.trim();
  if (key) {
    localStorage.setItem('agnes_api_key', key);
    savedKey = key;
    showKeyStatus('✅ 已儲存', 'ok');
  } else {
    localStorage.removeItem('agnes_api_key');
    savedKey = '';
    showKeyStatus('已清除', 'ok');
  }
}

async function verifyKey() {
  const key = $('apikey').value.trim();
  if (!key) { showKeyStatus('請填入金鑰', 'fail'); return; }

  showKeyStatus('驗證中...', 'ok');
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + key
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [{ role: 'user', content: 'hi' }],
        max_tokens: 5
      })
    });
    if (res.ok) showKeyStatus('✅ 金鑰有效', 'ok');
    else {
      const e = await res.json().catch(() => ({}));
      showKeyStatus('❌ ' + (e.error?.message || '無效'), 'fail');
    }
  } catch(e) {
    showKeyStatus('連線失敗：' + e.message, 'fail');
  }
}

function showKeyStatus(msg, type) {
  const el = $('keyStatus');
  el.textContent = msg;
  el.className = 'status show ' + type;
}

// === KEYBOARD SHORTCUT ===
input.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    translate2();
  }
});
</script>
</body>
</html>
